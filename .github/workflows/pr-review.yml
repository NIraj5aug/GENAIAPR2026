name: AI PR Review

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull_requests: write
  actions: read
  security-events: write

jobs:
  pr-review:
    name: Generate PR Summary and Review Notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR summary with GitHub Models
        id: generate_summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          CHANGED_FILES=$(git diff --name-only origin/$BASE_REF | paste -sd ", " -)
          python3 - <<'PY'
import json, os, subprocess
pr_title = os.environ.get('PR_TITLE', '')
pr_body = os.environ.get('PR_BODY', '')
changed_files = os.environ.get('CHANGED_FILES', '')
payload = {
  'model': 'openai/gpt-4o',
  'messages': [
    {
      'role': 'system',
      'content': 'You are an AI pull request review assistant. Provide a concise PR summary and highlight review focus areas.'
    },
    {
      'role': 'user',
      'content': (
        'Please summarize the following pull request and identify key review points. '
        f'Title: {pr_title}\n\nDescription: {pr_body}\n\nChanged files: {changed_files or "(no changed files)"}\n\n'
        'Include any potential risks, areas for manual review, and compliance gate checks.'
      )
    }
  ]
}
print(json.dumps(payload))
PY
          ) > payload.json
          curl -s -H "Content-Type: application/json" -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d @payload.json https://models.github.ai/inference/chat/completions \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['choices'][0]['message']['content'])" > pr-summary.txt
          echo 'PR summary generated:'
          cat pr-summary.txt

      - name: Comment PR summary on pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-summary.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## AI PR Review Summary\n\n${body}`
            });
